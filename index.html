<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TTC Quiz</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
overflow:hidden;
text-align:center;
}

.section{
display:none;
height:100vh;
width:100%;
position:absolute;
top:0;
left:0;
justify-content:center;
align-items:center;
flex-direction:column;
}

/* Intro */

#intro{
display:flex;
background:black;
}

#stars{
position:absolute;
width:100%;
height:100%;
background:url("https://www.transparenttextures.com/patterns/stardust.png");
animation:starsMove 40s linear infinite;
}

@keyframes starsMove{
from{background-position:0 0}
to{background-position:1000px 1000px}
}

.logo{
width:140px;
margin-bottom:20px;
animation:float 3s infinite ease-in-out;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0)}
}

/* Name screen */

input{
padding:12px;
font-size:16px;
border-radius:8px;
border:none;
margin-top:15px;
width:220px;
}

button{
padding:12px 25px;
font-size:16px;
background:#ff6b6b;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:20px;
}

/* quiz */

.option{
background:#1e293b;
padding:12px;
margin:10px;
border-radius:8px;
cursor:pointer;
width:200px;
}

.option:hover{
background:#334155;
}

.progress{
height:8px;
width:300px;
background:#334155;
margin-top:20px;
border-radius:10px;
overflow:hidden;
}

.bar{
height:100%;
width:0%;
background:#22c55e;
}

</style>
</head>

<body>

<!-- INTRO -->

<div id="intro" class="section" style="display:flex">

<div id="stars"></div>

<img class="logo" src="https://i.ibb.co/dsBdtCwK/Ttc-logo.png">

<h1>Tushar Tuition Classes</h1>

<p>Concept Based Learning</p>

</div>


<!-- NAME SCREEN -->

<div id="nameScreen" class="section">

<h2>Enter Your Name</h2>

<input id="studentName" placeholder="Your Name">

<button onclick="saveName()">Continue</button>

</div>


<!-- WELCOME -->

<div id="welcome" class="section">

<h2 id="welcomeText"></h2>

<p>Ready for today's quiz?</p>

<button onclick="startQuiz()">Start Quiz</button>

</div>


<!-- QUIZ -->

<div id="quiz" class="section">

<h2 id="question"></h2>

<div id="options"></div>

<div class="progress">
<div id="bar" class="bar"></div>
</div>

</div>


<!-- RESULT -->

<div id="result" class="section">

<h2 id="scoreText"></h2>

<canvas id="confetti"></canvas>

</div>


<script>

let student=""
let qIndex=0
let score=0

const quiz=[
{
q:"She ___ to school daily.",
options:["Go","Goes","Going"],
answer:1
},
{
q:"They ___ football yesterday.",
options:["Played","Play","Playing"],
answer:0
},
{
q:"I ___ my homework now.",
options:["Do","Doing","Am doing"],
answer:2
},
{
q:"We ___ TV every evening.",
options:["Watch","Watching","Watched"],
answer:0
},
{
q:"He ___ lunch already.",
options:["Eat","Ate","Has eaten"],
answer:2
}
]


/* intro auto */

setTimeout(()=>{
show("nameScreen")
},3000)


function show(id){

document.querySelectorAll(".section")
.forEach(s=>s.style.display="none")

document.getElementById(id).style.display="flex"

}


/* save name */

function saveName(){

student=document.getElementById("studentName").value

if(student=="") student="Student"

document.getElementById("welcomeText").innerText=
"Welcome "+student+" 👋"

show("welcome")

}


/* start quiz */

function startQuiz(){

show("quiz")
loadQuestion()

}


/* load question */

function loadQuestion(){

let q=quiz[qIndex]

document.getElementById("question").innerText=q.q

let optionsHTML=""

q.options.forEach((opt,i)=>{

optionsHTML+=
`<div class="option" onclick="check(${i})">${opt}</div>`

})

document.getElementById("options").innerHTML=optionsHTML

document.getElementById("bar").style.width=
((qIndex)/quiz.length)*100+"%"

}


/* check answer */

function check(i){

if(i===quiz[qIndex].answer) score++

qIndex++

if(qIndex<quiz.length){

loadQuestion()

}else{

showResult()

}

}


/* result */

function showResult(){

show("result")

let percent=Math.round((score/quiz.length)*100)

document.getElementById("scoreText").innerText=
student+" scored "+percent+"%"

startConfetti()

}


/* confetti */

function startConfetti(){

const canvas=document.getElementById("confetti")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let pieces=[]

for(let i=0;i<150;i++){

pieces.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*6+4,
d:Math.random()*10
})

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="white"

pieces.forEach(p=>{
ctx.beginPath()
ctx.arc(p.x,p.y,p.r,0,Math.PI*2)
ctx.fill()
})

update()

}

function update(){

pieces.forEach(p=>{
p.y+=2
if(p.y>canvas.height) p.y=0
})

}

setInterval(draw,20)

}

</script>

</body>
</html>
